[env:esp32-s3-wrover]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.31

build_flags =
    -DBOARD_HAS_PSRAM
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=13
    -D TFT_RST=14
    -D LOAD_GLCD=1
    -D SPI_FREQUENCY=27000000